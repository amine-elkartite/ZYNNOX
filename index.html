<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZYNNOX Platform</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #06111f; color: #f8fafc; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; }
      main { max-width: 780px; border: 1px solid rgba(148,163,184,.28); border-radius: 12px; background: #0f2134; padding: 32px; }
      h1 { font-size: clamp(36px, 8vw, 76px); line-height: .95; margin: 0 0 16px; }
      p { color: #9fb2c7; font-size: 18px; }
      code { background: rgba(255,255,255,.08); padding: 3px 6px; border-radius: 6px; }
      a { color: #22d3ee; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <p>ZYNNOX SaaS AI Agent Platform</p>
      <h1>Use the production dashboard in <code>client/</code>.</h1>
      <p>
        The previous single-file prototype has been retired to avoid frontend-side secrets and local-model coupling.
        Run <code>npm run dev</code>, then open <a href="http://localhost:5173">http://localhost:5173</a>.
      </p>
    </main>
  </body>
</html>
